name: CI/CD

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/optibot

jobs:
  # ─── 1. Build & push l'image Docker sur GHCR ───────────────────────────────
  build:
    name: Build & Push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # nécessaire pour pousser sur ghcr.io

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tag = sha court)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha       # cache des layers entre les runs
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_GA_ID=${{ secrets.NEXT_PUBLIC_GA_ID }}

  # ─── 2. Déploiement sur le serveur via SSH ──────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    environment: production         # optionnel : protection de branche dans GitHub

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Authentification GHCR sur le serveur
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            cd /app/optibot

            # Récupère la dernière version du docker-compose
            git pull origin main

            # Tire la nouvelle image (déjà compilée sur GitHub Actions)
            docker compose pull app

            # Redémarre le conteneur app sans downtime notable
            docker compose up -d --no-build app

            # Nettoyage des anciennes images
            docker image prune -f

            echo "✓ Déploiement terminé"
