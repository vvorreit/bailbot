name: Deploy to Scaleway

on:
  push:
    branches: [particulier]
  workflow_dispatch:

env:
  SCW_REGISTRY: rg.fr-par.scw.cloud
  SCW_NAMESPACE: bailbot
  IMAGE_NAME: rg.fr-par.scw.cloud/bailbot/bailbot-app

jobs:
  build-and-push:
    name: Build & Push to Scaleway Registry
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to Scaleway Registry
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_GA_ID=${{ secrets.NEXT_PUBLIC_GA_ID }}

  deploy:
    name: Deploy to Scaleway Serverless Container
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Install Scaleway CLI
        run: |
          curl -s https://raw.githubusercontent.com/scaleway/scaleway-cli/master/scripts/get.sh | sh
          scw version

      - name: Deploy container
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_DEFAULT_REGION: fr-par
          SCW_DEFAULT_ZONE: fr-par-1
        run: |
          scw container container update \
            ${{ secrets.SCW_CONTAINER_ID }} \
            registry-image=${{ env.IMAGE_NAME }}:latest \
            --wait

          scw container container deploy ${{ secrets.SCW_CONTAINER_ID }}
          echo "✓ Déployé sur Scaleway Serverless"
